// tag::publish_toml_file[]
plugins {
    id 'version-catalog'
    id 'maven-publish'
}

catalog {
    versionCatalog {
        from(files("gradle/libs.versions.toml"))
    }
}

group = 'com.mycompany'
version = '1.0'

publishing {
    publications {
        maven(MavenPublication) {
            from components.versionCatalog
        }
    }
}
// end::publish_toml_file[]

publishing {
    repositories {
        maven {
            url = layout.buildDirectory.dir('repo')
        }
    }
}
