// tag::resolve-rules[]
configurations.configureEach {
    resolutionStrategy.dependencySubstitution {
        substitute(module("com.example:old-library"))
            .because("Our license only allows use of version 1")
            .using(module("com.example:new-library:1.0.0"))
    }
}
// end::resolve-rules[]

// tag::custom-versioning-scheme[]
configurations.configureEach {
    resolutionStrategy.dependencySubstitution {
        all { dep ->
            if (dep.requested.version == 'default') {
                def version = findDefaultVersionInCatalog(dep.requested.group, dep.requested.module)
                dep.useTarget("${dep.requested.group}:${dep.requested.module}:${version.version}", version.because)
            }
        }
    }
}

def findDefaultVersionInCatalog(String group, String name) {
    //some custom logic that resolves the default version into a specific version
    [version: "1.0", because: 'tested by QA']
}
// end::custom-versioning-scheme[]

// tag::denying_version[]
configurations.configureEach {
    resolutionStrategy.dependencySubstitution {
        substitute(module('org.software:some-library:1.2'))
            .because('fixes critical bug in 1.2')
            .using(module('org.software:some-library:1.2.1'))
    }
}
// end::denying_version[]

// tag::module_substitution[]
configurations.configureEach {
    resolutionStrategy.dependencySubstitution {
        all { dep ->
            if (dep.requested.module == 'groovy-all') {
                dep.useTarget("${dep.requested.group}:groovy:${dep.requested.version}", "prefer 'groovy' over 'groovy-all'")
            }
            if (dep.requested.module == 'log4j') {
                dep.useTarget('org.slf4j:log4j-over-slf4j:1.7.10', "prefer 'log4j-over-slf4j' 1.7.10 over any version of 'log4j'")
            }
        }
    }
}
// end::module_substitution[]
