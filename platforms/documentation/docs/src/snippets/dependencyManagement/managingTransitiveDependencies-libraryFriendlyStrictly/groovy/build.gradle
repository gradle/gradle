plugins {
    id 'java-library'
}

repositories {
    mavenCentral()
}

// tag::library-friendly-strictly[]
dependencies {
    // Library-friendly: constrains only the module you need, with a flexible range
    implementation('org.apache.logging.log4j:log4j-core') {
        version {
            strictly '[2.17, 3['
            prefer '2.17.1'
        }
    }
}
// end::library-friendly-strictly[]
