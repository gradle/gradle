// tag::avoid-this[]
abstract class CustomTask extends DefaultTask {
    @Input
    abstract Property<String> getFlavor()
    @OutputDirectory
    abstract DirectoryProperty getOutputDirectory()

    @TaskAction
    void run() {
        new File(outputDirectory.get().asFile, flavor.get()).write("Hello") // <1>
    }
}

abstract class ConsumerTask extends DefaultTask {
    @InputDirectory
    abstract DirectoryProperty getInputDirectory()
    @OutputFile
    abstract RegularFileProperty getOutputFile()

    @TaskAction
    void run() {
        def atxt = new File(inputDirectory.get().asFile, "a.txt") // <2>
        outputFile.get().asFile.write(atxt.text)
    }
}

def taskA = tasks.register("taskA", CustomTask) {
    flavor = "a.txt"
    outputDirectory = layout.buildDirectory.dir("shared") // <3>
}
tasks.register("taskB", CustomTask) {
    flavor = "b.txt"
    outputDirectory = layout.buildDirectory.dir("shared") // <4>
}
tasks.register("consumer", ConsumerTask) {
    inputDirectory = taskA.flatMap { it.outputDirectory }  // <5>
    outputFile = layout.buildDirectory.file("consumerOutput.txt")
}
// end::avoid-this[]
