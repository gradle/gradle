// tag::common-tasks[]
// Task that generates a file
abstract class GeneratorTask extends DefaultTask {
    @OutputFile
    abstract RegularFileProperty getOutputFile()

    @TaskAction
    void generate() {
        outputFile.get().asFile.text = "Generated content"
    }
}

// Task that consumes the generated file
abstract class ConsumerTask extends DefaultTask {
    @InputFile
    abstract RegularFileProperty getInputFile()

    @Input
    abstract Property<String> getInputContent()

    @TaskAction
    void consume() {
        println "Input file: ${inputFile.get().asFile}"
        println "Content: ${inputContent.get()}"
    }
}
// end::common-tasks[]

// tag::naked-provider[]
def generator = tasks.register('generate', GeneratorTask) {
    outputFile = layout.buildDirectory.file('output.txt')
}

tasks.register('consumeNaked', ConsumerTask) {
    // BROKEN: Creating provider {} inside flatMap creates a "naked provider"
    // The resulting provider has NO knowledge of the 'generator' task
    inputFile = generator.flatMap { it.outputFile }

    // BROKEN: Don't chain without map
    inputContent = generator.flatMap {
        provider { it.outputFile.get().asFile.text }
    }
}
// end::naked-provider[]

// tag::config-time-read[]
def generator2 = tasks.register('generate2', GeneratorTask) {
    outputFile = layout.buildDirectory.file('output2.txt')
}

tasks.register('consumeEager', ConsumerTask) {
    // BROKEN: Tries to read the file at configuration time
    // The file doesn't exist yet - generator hasn't run!
    inputFile = generator2.flatMap { it.outputFile }
    inputContent = generator2.map {
        it.outputFile.get().asFile.text // FAILS HERE
    }
}
// end::config-time-read[]

// tag::derived-property[]
abstract class ProducerTask extends DefaultTask {
    @Internal
    abstract DirectoryProperty getSomeDirectory()

    // This property is DERIVED via map - not directly annotated
    @OutputFile
    Provider<RegularFile> getOutputFile() {
        someDirectory.map { it.file('output.txt') }
    }

    @TaskAction
    void execute() {
        outputFile.get().asFile.text = 'content'
    }
}

def producer = tasks.register('producer', ProducerTask) {
    someDirectory = layout.buildDirectory.dir('output')
}

tasks.register('consume', Sync) {
    // BROKEN: flatMap on a derived property may lose the task dependency
    from(producer.flatMap { it.outputFile })
    into(layout.buildDirectory.dir('sync'))
}
// end::derived-property[]
