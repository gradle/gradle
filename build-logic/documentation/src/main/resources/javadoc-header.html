<link id="hljs-theme" rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/stackoverflow-light.min.css"

      crossorigin="anonymous"
      referrerpolicy="no-referrer">
<script>
(function() {
  var THEMES = {
    light: {
      href: 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/stackoverflow-light.min.css',
      integrity: 'sha512-RDtnAhiPytLVV3AwzHkGVMVI4szjtSjxxyhDaH3gqdHPIw5qwQld1MVGuMu1EYoof+CaEccrO3zUVb13hQFU/A=='
    },
    dark: {
      href: 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/stackoverflow-dark.min.css',
      integrity: 'sha512-Xn1b0y/BrCD7usnEh6r9CcKxHXFVleVUjGDnfc95zDDwFUwtOz3lJC/XtJcuLRNyrMQJEEToFfwjC9Ue/aWY/g=='
    }
  };
  var mql = window.matchMedia('(prefers-color-scheme: dark)');
  var hljsEl = document.getElementById('hljs-theme');
  function applyTheme(dark) {
    var t = dark ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', t);
    if (hljsEl) {
      hljsEl.href = THEMES[t].href;
      hljsEl.integrity = THEMES[t].integrity;
      hljsEl.crossOrigin = 'anonymous';
    }
  }
  applyTheme(mql.matches);
  mql.addEventListener('change', function(e) { applyTheme(e.matches); });
})();
</script>
