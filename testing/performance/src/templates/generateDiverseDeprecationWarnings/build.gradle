// Emits ~11k deprecations spread across many distinct script locations and fired through
// deep call stacks, so that each one produces a different stack trace and resolvable
// location. This stresses per-problem stack trace capture and location inference, unlike
// generateLotsOfDeprecationWarnings which fires everything from a single shallow site.

int numSites = 50
int perSite = 200
int baseDepth = 30

// Every Nth deprecation per site carries a unique message (the rest repeat), so distinct
// problems still flow past the summarizer's per-id dedup while sharing one capture site.
int uniqueEvery = 10

File sitesDir = new File(projectDir, "sites")
sitesDir.mkdirs()

for (int n = 0; n < numSites; n++) {
    // Vary capture depth across sites, staying under the 50-frame cap, so capture cost is
    // exercised across a range of stack depths rather than one fixed depth.
    int depth = baseDepth + (n % 16)
    File site = new File(sitesDir, "dep_${n}.gradle")
    if (!site.exists()) {
        site.text = """\
@groovy.transform.CompileStatic
void fire(int depth, String message) {
    if (depth > 1) {
        fire(depth - 1, message)
        return
    }
    org.gradle.internal.deprecation.DeprecationLogger.deprecate(message).willBecomeAnErrorInGradle10().withUserManual("feature_lifecycle", "sec:deprecated").nagUser()
}

for (int i = 0; i < ${perSite}; i++) {
    fire(${depth}, "Some repetitive deprecation from site ${n}")
    if (i % ${uniqueEvery} == 0) {
        fire(${depth}, "Some unique deprecation from site ${n} number " + i)
    }
}
"""
    }
    apply from: "sites/dep_${n}.gradle"
}
