name: Cleanup stale performance test data

on:
  schedule:
    - cron: '0 4 * * 1'  # Run every Monday at 4:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  cleanup-stale-performance-data:
    runs-on: ubuntu-latest

    if: github.repository == 'gradle/gradle'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::992382829881:role/GHASecrets_gradle_all
          aws-region: "eu-central-1"
      
      - name: Get secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            PERFORMANCE_DB_URL, gha/gradle/_all/PERFORMANCE_DB_URL
            PERFORMANCE_DB_USERNAME, gha/gradle/_all/PERFORMANCE_DB_USERNAME
            PERFORMANCE_DB_PASSWORD_TCAGENT, gha/gradle/_all/PERFORMANCE_DB_PASSWORD
      
      - name: Extract database host from URL
        run: |
          # jdbc:mysql://gradle-bt-performance.xyz.eu-central-1.rds.amazonaws.com:3306 -> gradle-bt-performance.xyz.eu-central-1.rds.amazonaws.com
          python -c "import os; url=os.environ['PERFORMANCE_DB_URL']; print('DB_HOST=' + url.split('//')[1].split(':')[0])" >> $GITHUB_ENV
      
      - name: Clean up stale data from results database
        run: |
          echo "Cleaning up stale data from results database..."
          docker run --rm mysql:latest mysql \
            -u${{ env.PERFORMANCE_DB_USERNAME }} \
            -p${{ env.PERFORMANCE_DB_PASSWORD_TCAGENT }} \
            -h${{ env.DB_HOST }} \
            results \
            -e 'delete from testOperation where testExecution in (select id from testExecution where startTime < NOW() - INTERVAL 365 DAY)'
          
          docker run --rm mysql:latest mysql \
            -u${{ env.PERFORMANCE_DB_USERNAME }} \
            -p${{ env.PERFORMANCE_DB_PASSWORD_TCAGENT }} \
            -h${{ env.DB_HOST }} \
            results \
            -e 'delete from testExecution where startTime < NOW() - INTERVAL 365 DAY'
      
      - name: Clean up stale data from cross_build_results database
        run: |
          echo "Cleaning up stale data from cross_build_results database..."
          docker run --rm mysql:latest mysql \
            -u${{ env.PERFORMANCE_DB_USERNAME }} \
            -p${{ env.PERFORMANCE_DB_PASSWORD_TCAGENT }} \
            -h${{ env.DB_HOST }} \
            cross_build_results \
            -e 'delete from testOperation where testExecution in (select id from testExecution where startTime < NOW() - INTERVAL 365 DAY)'
          
          docker run --rm mysql:latest mysql \
            -u${{ env.PERFORMANCE_DB_USERNAME }} \
            -p${{ env.PERFORMANCE_DB_PASSWORD_TCAGENT }} \
            -h${{ env.DB_HOST }} \
            cross_build_results \
            -e 'delete from testExecution where startTime < NOW() - INTERVAL 365 DAY'
      
      - name: Summary
        run: |
          echo "✅ Cleanup completed successfully"
          echo "🗑️  Removed test data older than 365 days from both databases"
