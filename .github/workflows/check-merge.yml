name: Check merge
on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
  merge_group:
    types:
      - checks_requested

permissions: {}

jobs:
  # See .github/workflows/CheckBadMerge.groovy for explanation
  check_bad_merge:
    if: github.event.pull_request.base.ref == 'master'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Groovy
        run: sudo apt-get install groovy
      - name: List PR commits
        run: |
          git log --pretty=format:"%H" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > pr_commits.txt
      - name: Check PR commits
        id: run_check
        run: |
          groovy .github/workflows/CheckBadMerge.groovy pr_commits.txt > output.txt 2>&1
      - name: Read output file
        id: read_output
        if: ${{ always() }}
        run: |
          cat output.txt
          OUTPUT=$(cat output.txt)
          echo "OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$OUTPUT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Comment on PR if check failed
        if: ${{ failure() }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `
            Some bad merge is found:
            \`\`\`
            ${{ env.OUTPUT }}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
  # check that only released Gradle versions are used in the wrapper
  check_wrapper:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check used wrapper
        run: |
          set -eu
          for commit in $(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
              git checkout $commit --quiet --detach
              WRAPPER_GRADLE_VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\(.*\)-[a-z]*\.[a-z]*/\1/')
              echo "Commit $commit wrapper: $WRAPPER_GRADLE_VERSION"
              if ! [[ $WRAPPER_GRADLE_VERSION =~ ^[0-9.]+(-(rc|milestone|m)-[0-9]+)?$ ]]; then
                  RED="\e[31m"
                  ENDCOLOR="\e[0m"
                  >&2 echo -e "${RED}Bad wrapper version $WRAPPER_GRADLE_VERSION used in commit $commit.${ENDCOLOR} Please rebase your branch to ensure that each commit uses only released Gradle versions in wrapper (GA, RC or milestone)."
                  exit 1
              fi
          done

  # check that remote project refs are tagged
  check_remote_project_ref:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Groovy
        run: sudo apt-get install groovy
      - name: Check remote project refs are tagged
        run: |
          groovy .github/workflows/CheckRemoteProjectRef.groovy \
            androidSmokeTestProjectRef \
            buildBuilderProjectRef \
            nowInAndroidBuildProjectRef \
            largeAndroidBuildProjectRef \
            largeAndroidBuild2ProjectRef \
            excludeRuleMergingBuildProjectRef \
            springBootAppProjectRef \
            largeNativeBuildProjectRef

  # Aggregator job - only runs if all checks succeed
  check_merge:
    needs: [check_bad_merge, check_wrapper, check_remote_project_ref]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Check all checks passed
        id: check_status
        run: |
          # check_bad_merge can be skipped if base ref is not master, which is fine
          if [ "${{ needs.check_bad_merge.result }}" == "failure" ]; then
            echo "check_bad_merge failed"
            echo "all_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          if [ "${{ needs.check_wrapper.result }}" != "success" ]; then
            echo "check_wrapper failed"
            echo "all_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          if [ "${{ needs.check_remote_project_ref.result }}" != "success" ]; then
            echo "check_remote_project_ref failed"
            echo "all_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✓ All checks passed"
          echo "all_passed=true" >> $GITHUB_OUTPUT
      - name: Publish commit status
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // For PR events, use the PR head SHA; for workflow_dispatch, use the workflow run's commit SHA
            const commitSha = context.eventName === 'pull_request' 
              ? context.payload.pull_request.head.sha 
              : context.sha;
            
            const allPassed = '${{ steps.check_status.outputs.all_passed }}' === 'true';
            const state = allPassed ? 'success' : 'failure';
            const description = allPassed 
              ? 'All checks passed: check-bad-merge, check_wrapper, check_remote_project_ref'
              : 'Some checks failed: check-bad-merge, check_wrapper, check_remote_project_ref';
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: commitSha,
              state: state,
              context: 'check-merge',
              description: description
            });

