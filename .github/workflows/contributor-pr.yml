name: Contributor CI Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  # On master/release, we don't want any jobs cancelled so the sha is used to name the group
  group: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' ) && format('contributor-pr-base-{0}', github.sha) || format('contributor-pr-{0}', github.ref) }}
  cancel-in-progress: false

env:
  # Set the DEVELOCITY_ACCESS_KEY so that a Build Scan is generated
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  # Enable debug for the `gradle-build-action` cache operations
  GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: true

permissions: {}

jobs:
  build:
    name: "Compile All"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: git clone
        uses: actions/checkout@v7
      - id: setup-matrix
        run: echo "matrix=$(jq -c -f .github/workflows/extract-unit-test-split.jq .teamcity/subprojects.json)" >> $GITHUB_OUTPUT
      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - id: determine-sys-prop-args
        uses: actions/github-script@v9
        with:
          script: |
            if (context.payload.pull_request && context.payload.pull_request.head.repo.fork) {
                core.setOutput('sys-prop-args', '-DagreePublicBuildScanTermOfService=yes -Ddevelocity.server.url=https://usw-edge.gradle.org -Ddevelocity.edge.discovery=false --scan')
            } else {
                core.setOutput('sys-prop-args', '')
            }
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew compileAll -DdisableLocalCache=true ${{ steps.determine-sys-prop-args.outputs.sys-prop-args }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-receipt.properties
          path: platforms/core-runtime/base-services/build/generated-resources/build-receipt/org/gradle/build-receipt.properties
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}
      sys-prop-args: ${{ steps.determine-sys-prop-args.outputs.sys-prop-args }}

  unit-test-windows-arm:
    name: "Win ARM JDK ${{ matrix.jdk.name }}"
    permissions:
      contents: read
    runs-on: windows-11-arm
    needs: build
    strategy:
      fail-fast: false
      matrix:
        jdk:
          - { name: "21.0.0 GA", distribution: zulu, version: "21.0.0" }
          - { name: "22.0.0 GA", distribution: zulu, version: "22.0.0" }
          - { name: "23.0.0 GA", distribution: zulu, version: "23.0.0" }
          - { name: "24.0.0 GA", distribution: zulu, version: "24.0.0" }
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true
      - name: git clone
        uses: actions/checkout@v7
      - name: Force daemon JVM to the matrix JDK (remove daemon JVM criteria)
        run: |
          # The daemon JVM is normally pinned by this file (toolchainVersion).
          # Removing it makes the daemon run on JAVA_HOME, i.e. the matrix JDK.
          Remove-Item -Force gradle/gradle-daemon-jvm.properties
      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.jdk.distribution }}
          java-version: ${{ matrix.jdk.version }}
      - uses: actions/download-artifact@v8
        with:
          name: build-receipt.properties
          path: incoming-distributions/build-receipt.properties
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - name: Run :native:test repeatedly
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "Using JAVA_HOME=$env:JAVA_HOME"
          & "$env:JAVA_HOME\bin\java.exe" -version
          $iters = 8
          $fail = 0
          for ($i = 1; $i -le $iters; $i++) {
            Write-Host "==================== iteration $i / $iters (JDK ${{ matrix.jdk.name }}) ===================="
            ./gradlew :native:test --stacktrace "-Dorg.gradle.java.home=$env:JAVA_HOME" -DdisableLocalCache=true -PflakyTests=exclude
            $code = $LASTEXITCODE
            Write-Host "iteration $i exit code: $code"
            if ($code -ne 0) { $fail++ }
          }
          Write-Host "==================== SUMMARY JDK ${{ matrix.jdk.name }}: $fail / $iters failed ===================="
          if ($fail -gt 0) { exit 1 }
