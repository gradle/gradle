name: Contributor CI Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  # On master/release, we don't want any jobs cancelled so the sha is used to name the group
  group: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' ) && format('contributor-pr-base-{0}', github.sha) || format('contributor-pr-{0}', github.ref) }}
  cancel-in-progress: false

env:
  # Set the DEVELOCITY_ACCESS_KEY so that a Build Scan is generated
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  # Enable debug for the `gradle-build-action` cache operations
  GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: true

permissions: {}

jobs:
  build:
    name: "Compile All"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: git clone
        uses: actions/checkout@v7
      - id: setup-matrix
        run: echo "matrix=$(jq -c -f .github/workflows/extract-unit-test-split.jq .teamcity/subprojects.json)" >> $GITHUB_OUTPUT
      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - id: determine-sys-prop-args
        uses: actions/github-script@v9
        with:
          script: |
            if (context.payload.pull_request && context.payload.pull_request.head.repo.fork) {
                core.setOutput('sys-prop-args', '-DagreePublicBuildScanTermOfService=yes -Ddevelocity.server.url=https://usw-edge.gradle.org -Ddevelocity.edge.discovery=false --scan')
            } else {
                core.setOutput('sys-prop-args', '')
            }
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew compileAll -DdisableLocalCache=true ${{ steps.determine-sys-prop-args.outputs.sys-prop-args }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-receipt.properties
          path: platforms/core-runtime/base-services/build/generated-resources/build-receipt/org/gradle/build-receipt.properties
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}
      sys-prop-args: ${{ steps.determine-sys-prop-args.outputs.sys-prop-args }}

  sanity-check:
    name: "Sanity Check on Linux"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: git clone
        uses: actions/checkout@v7
      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/download-artifact@v8
        with:
          name: build-receipt.properties
          path: incoming-distributions/build-receipt.properties
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew sanityCheck -DdisableLocalCache=true ${{ needs.build.outputs.sys-prop-args }}
      - name: Upload Compatibility Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: binary-compatibility-report
          path: testing/architecture-test/build/reports/binary-compatibility/report.html

  unit-test:
    name: "${{ matrix.bucket.name }} (Unit Test)"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        bucket: ${{ fromJson(needs.build.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: git clone
        uses: actions/checkout@v7
      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/download-artifact@v8
        with:
          name: build-receipt.properties
          path: incoming-distributions/build-receipt.properties
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      - run: ./gradlew ${{ matrix.bucket.tasks }} -DdisableLocalCache=true -PflakyTests=exclude ${{ needs.build.outputs.sys-prop-args }}

  unit-test-windows-arm:
    name: "Unit Test Windows ARM"
    permissions:
      contents: read
    runs-on: windows-11-arm
    needs: build
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true
      - name: git clone
        uses: actions/checkout@v7
      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: microsoft # no temurin available
          java-version: 25
      - uses: actions/download-artifact@v8
        with:
          name: build-receipt.properties
          path: incoming-distributions/build-receipt.properties
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}
      # DEBUG (bz-debug-windows-arm-timeout): reassemble the locally-built, patched Gradle distribution
      # (committed split into <100MB parts under .local-dist/) and run the build with it as the bootstrap
      # distribution, so the patched DefaultBuildEventsListenerRegistry shutdown diagnostics are exercised.
      - name: Reassemble patched Gradle distribution
        run: |
          $out = [System.IO.File]::Create("gradle/wrapper/patched-gradle-bin.zip")
          Get-ChildItem .local-dist/gradle-bin.zip.part-* | Sort-Object Name | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            $out.Write($bytes, 0, $bytes.Length)
          }
          $out.Close()
          Write-Host "Reassembled $((Get-Item gradle/wrapper/patched-gradle-bin.zip).Length) bytes"
      - name: Point wrapper at patched distribution
        run: |
          (Get-Content gradle/wrapper/gradle-wrapper.properties) `
            -replace '^distributionUrl=.*', 'distributionUrl=patched-gradle-bin.zip' `
            -replace '^validateDistributionUrl=.*', 'validateDistributionUrl=false' |
            Set-Content gradle/wrapper/gradle-wrapper.properties
          Get-Content gradle/wrapper/gradle-wrapper.properties
      - run: ./gradlew :native:test --% -DdisableLocalCache=true -PflakyTests=exclude ${{ needs.build.outputs.sys-prop-args }}
